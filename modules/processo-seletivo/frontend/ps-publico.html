<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Vagas em Aberto — IAHub</title>
  <link rel="stylesheet" href="/css/iahub.css">
  <style>
    html, body { height: auto; overflow: auto; }
    body { background: var(--bg-base); font-size: 15px; }

    /* ── Topbar ─────────────────────────────────────────────────── */
    .pub-topbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      height: 62px;
      display: flex;
      align-items: center;
      padding: 0 36px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--shadow-sm);
    }
    .pub-logo { display: flex; align-items: center; gap: 12px; }
    .pub-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: #fff;
      box-shadow: 0 2px 8px rgba(37,99,235,.18);
    }
    .pub-logo-name {
      font-size: 17px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pub-logo-sep  { color: var(--border-hi); }
    .pub-logo-sub  { font-size: 14px; color: var(--text-lo); }

    /* ── Hero ───────────────────────────────────────────────────── */
    .pub-hero {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 24px 36px 20px;
      text-align: center;
    }
    .pub-hero h1 {
      font-size: clamp(20px, 2.5vw, 26px);
      font-weight: 700;
      color: var(--text-hi);
      margin-bottom: 6px;
      letter-spacing: -.3px;
    }
    .pub-hero p {
      font-size: 14px;
      color: var(--text-md);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Container ──────────────────────────────────────────────── */
    .pub-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 32px 80px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--text-lo);
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* ── Grade de vagas ─────────────────────────────────────────── */
    .vagas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 300px));
      gap: 20px;
      justify-content: center;
    }

    .vaga-tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px 26px;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: var(--shadow-sm);
      user-select: none;
      min-height: 180px;
    }
    .vaga-tile:hover {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-sm);
      transform: translateY(-3px);
    }

    .tile-area {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-lo);
      font-weight: 600;
    }
    .tile-nome {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-hi);
      line-height: 1.3;
    }
    .tile-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .badge {
      font-size: 13px; padding: 4px 13px; border-radius: 20px;
      font-weight: 500; white-space: nowrap;
    }
    .badge-open  { background: #dcfce7; color: var(--success); border: 1px solid #86efac; }
    .badge-nivel { background: #eff6ff; color: var(--accent);  border: 1px solid #bfdbfe; }
    .badge-qtd   { background: #dcfce7; color: var(--success); border: 1px solid #86efac; }
    .badge-form  { background: var(--bg-hover); color: var(--text-md); border: 1px solid var(--border); }

    .tile-cta {
      margin-top: auto;
      font-size: 15px;
      color: var(--accent);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Modal ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

    .modal-box {
      background: var(--bg-card);
      border-radius: 14px;
      width: 100%;
      max-width: 660px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: slideUp .18s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    .modal-header {
      position: sticky;
      top: 0;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      z-index: 10;
    }
    .modal-header-info { flex: 1; min-width: 0; }
    .modal-area {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-lo);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .modal-titulo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-hi);
      margin-bottom: 8px;
    }
    .modal-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .btn-fechar {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-lo);
      font-size: 22px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background var(--transition), color var(--transition);
      flex-shrink: 0;
    }
    .btn-fechar:hover { background: var(--bg-hover); color: var(--text-hi); }

    .modal-body { padding: 28px 28px 32px; }

    /* ── Detalhes ───────────────────────────────────────────────── */
    .detalhe-bloco { margin-bottom: 22px; }
    .detalhe-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-lo);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .detalhe-texto {
      font-size: 15px;
      color: var(--text-md);
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .detalhe-tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .detalhe-tag {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 13px;
      font-size: 13px;
      color: var(--text-md);
    }

    /* ── Formulário ─────────────────────────────────────────────── */
    .form-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
    .form-section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-hi);
      margin-bottom: 22px;
    }
    .form-label { font-size: 14px; }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 34px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      background: var(--bg-card);
    }
    .upload-area:hover  { border-color: var(--accent-light); background: var(--bg-active); }
    .upload-area.drag-over { border-color: var(--accent); background: var(--bg-active); }
    .upload-area.has-file  { border-color: var(--success); background: #f0fdf4; border-style: solid; }
    .upload-icon { font-size: 30px; margin-bottom: 10px; }
    .upload-txt  { font-size: 14px; color: var(--text-md); line-height: 1.65; }
    .upload-txt strong { color: var(--accent); }
    .upload-nome { font-size: 14px; color: var(--success); font-weight: 600; margin-top: 8px; }
    .upload-hint { font-size: 12px; color: var(--text-lo); margin-top: 5px; }
    input[type=file] { display: none; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: background var(--transition);
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }
    .btn-submit:hover:not(:disabled) { background: #1d4ed8; }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

    .wa-alt {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      color: var(--text-lo);
    }
    .wa-alt a { color: #16a34a; font-weight: 500; }
    .wa-alt a:hover { text-decoration: underline; }

    .alert { border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-top: 12px; line-height: 1.65; }
    .alert-error   { background: #fef2f2; border: 1px solid #fca5a5; color: var(--error); }
    .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: var(--success); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Estados ────────────────────────────────────────────────── */
    .loading-state { text-align: center; padding: 72px 20px; color: var(--text-lo); }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 18px;
    }
    .empty-state  { text-align: center; padding: 80px 20px; color: var(--text-lo); }
    .empty-icon   { font-size: 48px; margin-bottom: 14px; }
    .empty-title  { font-size: 18px; font-weight: 600; color: var(--text-md); margin-bottom: 8px; }
    .empty-sub    { font-size: 15px; }

    .success-state  { text-align: center; padding: 36px 16px; }
    .success-icon   { font-size: 48px; margin-bottom: 14px; }
    .success-title  { font-size: 20px; font-weight: 700; color: var(--success); margin-bottom: 10px; }
    .success-sub    { font-size: 15px; color: var(--text-md); line-height: 1.75; }

    /* ── Footer ─────────────────────────────────────────────────── */
    .pub-footer {
      border-top: 1px solid var(--border);
      padding: 18px 32px;
      text-align: center;
      color: var(--text-lo);
      font-size: 13px;
      width: fit-content;
      margin: 0 auto;
    }

    /* ── Responsivo ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .pub-hero { padding: 16px 20px 14px; }
      .pub-container { padding: 16px 16px 60px; }
      .modal-body { padding: 20px 20px 28px; }
    }
  </style>
</head>
<body>

  <div class="pub-topbar">
    <div class="pub-logo">
      <div class="pub-logo-icon">IA</div>
      <span class="pub-logo-name">IAHub</span>
      <span class="pub-logo-sep">·</span>
      <span class="pub-logo-sub">Vagas</span>
    </div>
  </div>

  <div class="pub-hero">
    <h1>Trabalhe Conosco</h1>
    <p>Confira as vagas abertas e envie seu currículo em PDF diretamente por aqui.</p>
  </div>

  <div class="pub-container">
    <div class="section-title"> <h1>Vagas disponíveis</h1> </div>

    <div id="loading-vagas" class="loading-state">
      <div class="loading-spinner"></div>
      <div style="font-size:15px">Carregando vagas…</div>
    </div>

    <div id="vagas-lista" style="display:none"></div>

    <div id="empty-vagas" class="empty-state" style="display:none">
      <div class="empty-icon">💼</div>
      <div class="empty-title">Nenhuma vaga aberta no momento</div>
      <div class="empty-sub">Volte em breve para novas oportunidades.</div>
    </div>
  </div>

  <div class="pub-footer">
    Powered by <strong style="color:var(--text-md)">IAHub</strong> · Sistema de Gestão de Currículos
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="fecharModalFora(event)">
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <div class="modal-header-info" id="modal-header-info"></div>
        <button class="btn-fechar" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

<script>
  const token = '__PS_TOKEN__';
  let waNumero = null;
  let vagasData = [];

  async function init() {
    try {
      const [vagas, info] = await Promise.all([
        fetch(`/api/public/ps/${token}/vagas`).then(r => r.json()),
        fetch(`/api/public/ps/${token}/info`).then(r => r.json()),
      ]);
      waNumero = info.wa_numero || null;
      vagasData = vagas;
      renderVagas(vagas);
    } catch {
      document.getElementById('loading-vagas').innerHTML =
        '<div style="color:var(--error);font-size:15px">Erro ao carregar vagas. Recarregue a página.</div>';
    }
  }

  function renderVagas(vagas) {
    document.getElementById('loading-vagas').style.display = 'none';
    if (!vagas.length) {
      document.getElementById('empty-vagas').style.display = '';
      return;
    }
    const lista = document.getElementById('vagas-lista');
    lista.style.display = '';
    lista.innerHTML = `<div class="vagas-grid">${vagas.map(v => {
      const f = v.funcao || {};
      const badges = [
        `<span class="badge badge-open">● Aberta</span>`,
        f.nivel_experiencia && f.nivel_experiencia !== 'Não especificado'
          ? `<span class="badge badge-nivel">${esc(f.nivel_experiencia)}</span>` : '',
        `<span class="badge badge-qtd">${v.quantidade} vaga${v.quantidade !== 1 ? 's' : ''}</span>`,
      ].filter(Boolean).join('');

      return `
      <div class="vaga-tile" onclick="abrirModal(${v.id})">
        ${f.area ? `<div class="tile-area">${esc(f.area)}</div>` : ''}
        <div class="tile-nome">${esc(f.nome || 'Vaga em Aberto')}</div>
        <div class="tile-badges">${badges}</div>
        <div class="tile-cta">Ver vaga →</div>
      </div>`;
    }).join('')}</div>`;
  }

  function abrirModal(vagaId) {
    const v = vagasData.find(x => x.id === vagaId);
    if (!v) return;
    const f = v.funcao || {};

    const badges = [
      `<span class="badge badge-open">● Aberta</span>`,
      f.nivel_experiencia && f.nivel_experiencia !== 'Não especificado'
        ? `<span class="badge badge-nivel">${esc(f.nivel_experiencia)}</span>` : '',
      `<span class="badge badge-qtd">${v.quantidade} vaga${v.quantidade !== 1 ? 's' : ''}</span>`,
      f.formacao_necessaria
        ? `<span class="badge badge-form">${esc(f.formacao_necessaria.slice(0, 45))}</span>` : '',
    ].filter(Boolean).join('');

    document.getElementById('modal-header-info').innerHTML = `
      ${f.area ? `<div class="modal-area">${esc(f.area)}</div>` : ''}
      <div class="modal-titulo">${esc(f.nome || 'Vaga em Aberto')}</div>
      <div class="modal-badges">${badges}</div>`;

    const reqObrig = f.requisitos_obrigatorios
      ? f.requisitos_obrigatorios.split(/[\n,]+/).map(r => r.replace(/^[-•]\s*/, '').trim()).filter(Boolean) : [];
    const reqDesej = f.requisitos_desejaveis
      ? f.requisitos_desejaveis.split(/[\n,]+/).map(r => r.replace(/^[-•]\s*/, '').trim()).filter(Boolean) : [];
    const habs = Array.isArray(f.habilidades_tecnicas) ? f.habilidades_tecnicas : [];

    const waLink = waNumero
      ? `<div class="wa-alt">Prefere enviar pelo WhatsApp? <a href="https://wa.me/${waNumero}?text=${encodeURIComponent('Olá! Gostaria de enviar meu currículo.')}" target="_blank" rel="noopener">Clique aqui</a></div>`
      : '';

    document.getElementById('modal-body').innerHTML = `
      ${f.descricao ? `<div class="detalhe-bloco">
        <div class="detalhe-label">Sobre a vaga</div>
        <div class="detalhe-texto">${esc(f.descricao)}</div>
      </div>` : ''}

      ${reqObrig.length ? `<div class="detalhe-bloco">
        <div class="detalhe-label">Requisitos obrigatórios</div>
        <div class="detalhe-tags">${reqObrig.map(r => `<span class="detalhe-tag">✓ ${esc(r)}</span>`).join('')}</div>
      </div>` : ''}

      ${reqDesej.length ? `<div class="detalhe-bloco">
        <div class="detalhe-label">Diferenciais</div>
        <div class="detalhe-tags">${reqDesej.map(r => `<span class="detalhe-tag">${esc(r)}</span>`).join('')}</div>
      </div>` : ''}

      ${habs.length ? `<div class="detalhe-bloco">
        <div class="detalhe-label">Habilidades técnicas</div>
        <div class="detalhe-tags">${habs.map(h => `<span class="detalhe-tag">${esc(h)}</span>`).join('')}</div>
      </div>` : ''}

      ${f.formacao_necessaria ? `<div class="detalhe-bloco">
        <div class="detalhe-label">Formação</div>
        <div class="detalhe-texto">${esc(f.formacao_necessaria)}</div>
      </div>` : ''}

      <hr class="form-divider">

      <div id="form-section-${vagaId}">
        <div class="form-section-title">📄 Enviar meu currículo</div>

        <div class="form-group">
          <label class="form-label">Nome completo <span style="color:var(--error)">*</span></label>
          <input type="text" class="form-control" id="nome-${vagaId}" placeholder="Seu nome completo" autocomplete="name">
        </div>

        <div class="form-group">
          <label class="form-label">E-mail para contato <span style="color:var(--error)">*</span></label>
          <input type="email" class="form-control" id="email-${vagaId}" placeholder="seu@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label">Currículo em PDF <span style="color:var(--error)">*</span></label>
          <input type="file" id="file-${vagaId}" accept=".pdf,application/pdf" onchange="arquivoSelecionado(${vagaId}, this)">
          <div class="upload-area" id="upload-${vagaId}"
            onclick="document.getElementById('file-${vagaId}').click()"
            ondragover="dragOver(event,${vagaId})"
            ondragleave="dragLeave(${vagaId})"
            ondrop="dragDrop(event,${vagaId})">
            <div class="upload-icon">📎</div>
            <div class="upload-txt">Arraste o PDF aqui ou <strong>clique para selecionar</strong></div>
            <div class="upload-nome" id="upload-nome-${vagaId}" style="display:none"></div>
            <div class="upload-hint">Apenas PDF · máx. 10 MB</div>
          </div>
        </div>

        <div id="alert-${vagaId}"></div>

        <button class="btn-submit" id="btn-${vagaId}" onclick="enviarCandidatura(${vagaId})">
          Enviar Currículo
        </button>
        ${waLink}
      </div>`;

    document.getElementById('modal-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function fecharModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.body.style.overflow = '';
  }

  function fecharModalFora(e) {
    if (e.target === document.getElementById('modal-overlay')) fecharModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

  function dragOver(e, id)  { e.preventDefault(); document.getElementById(`upload-${id}`).classList.add('drag-over'); }
  function dragLeave(id)    { document.getElementById(`upload-${id}`).classList.remove('drag-over'); }
  function dragDrop(e, id)  { e.preventDefault(); dragLeave(id); const f = e.dataTransfer.files[0]; if (f) aplicarArquivo(id, f); }
  function arquivoSelecionado(id, inp) { if (inp.files[0]) aplicarArquivo(id, inp.files[0]); }

  function aplicarArquivo(id, file) {
    const area   = document.getElementById(`upload-${id}`);
    const nomeEl = document.getElementById(`upload-nome-${id}`);
    const alerta = document.getElementById(`alert-${id}`);
    if (!file.name.toLowerCase().endsWith('.pdf') && file.type !== 'application/pdf') {
      alerta.innerHTML = '<div class="alert alert-error">⚠️ Apenas arquivos PDF são aceitos.</div>';
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      alerta.innerHTML = '<div class="alert alert-error">⚠️ O arquivo excede 10 MB. Compacte o PDF e tente novamente.</div>';
      return;
    }
    area.classList.add('has-file');
    nomeEl.textContent = `✓ ${file.name}`;
    nomeEl.style.display = '';
    alerta.innerHTML = '';
    area._file = file;
  }

  async function enviarCandidatura(vagaId) {
    const nome   = document.getElementById(`nome-${vagaId}`).value.trim();
    const email  = document.getElementById(`email-${vagaId}`).value.trim();
    const area   = document.getElementById(`upload-${vagaId}`);
    const btn    = document.getElementById(`btn-${vagaId}`);
    const alerta = document.getElementById(`alert-${vagaId}`);
    const file   = area._file;

    alerta.innerHTML = '';
    if (!nome)  { alerta.innerHTML = '<div class="alert alert-error">⚠️ Informe seu nome completo.</div>'; document.getElementById(`nome-${vagaId}`).focus(); return; }
    if (!email) { alerta.innerHTML = '<div class="alert alert-error">⚠️ Informe seu e-mail para contato.</div>'; document.getElementById(`email-${vagaId}`).focus(); return; }
    if (!file)  { alerta.innerHTML = '<div class="alert alert-error">⚠️ Anexe seu currículo em PDF.</div>'; return; }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Processando… pode levar até 30s';

    try {
      const pdf_base64 = await lerBase64(file);
      const r = await fetch(`/api/public/ps/${token}/candidatar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vaga_id: vagaId, nome, email, pdf_base64, pdf_nome: file.name }),
      });
      const data = await r.json();

      if (!r.ok || data.error) {
        alerta.innerHTML = `<div class="alert alert-error">⚠️ ${data.error || 'Erro ao enviar. Tente novamente.'}</div>`;
        btn.disabled = false;
        btn.innerHTML = 'Enviar Currículo';
        return;
      }

      document.getElementById(`form-section-${vagaId}`).innerHTML = `
        <div class="success-state">
          <div class="success-icon">✅</div>
          <div class="success-title">Currículo enviado!</div>
          <div class="success-sub">
            Obrigado, <strong>${esc(nome)}</strong>! Recebemos seu currículo.<br>
            Entraremos em contato pelo e-mail <strong>${esc(email)}</strong>.
          </div>
        </div>`;

    } catch {
      alerta.innerHTML = '<div class="alert alert-error">⚠️ Erro de conexão. Verifique sua internet e tente novamente.</div>';
      btn.disabled = false;
      btn.innerHTML = 'Enviar Currículo';
    }
  }

  function lerBase64(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload  = e => resolve(e.target.result.split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
