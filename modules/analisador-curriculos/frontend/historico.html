<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Histórico de Análises — IAHub</title>
  <link rel="stylesheet" href="/css/iahub.css">
  <style>
    .analise-card   { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:border-color .2s; }
    .analise-card:hover { border-color:var(--accent); }
    .analise-header { display:flex;align-items:flex-start;gap:16px; }
    .analise-data   { font-size:11px;color:var(--text-lo);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px; }
    .analise-funcao { font-size:15px;font-weight:700;color:var(--text-hi); }
    .analise-meta   { font-size:12.5px;color:var(--text-lo);margin-top:4px; }
    .analise-stats  { display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap; }
    .stat-pill      { display:flex;flex-direction:column;align-items:center;background:var(--bg-hover);border-radius:8px;padding:8px 16px;min-width:80px; }
    .stat-pill-val  { font-size:20px;font-weight:700;color:var(--accent); }
    .stat-pill-lbl  { font-size:10.5px;color:var(--text-lo);text-transform:uppercase;letter-spacing:.04em;margin-top:2px; }
    .stat-pill-fin  .stat-pill-val { color:#15803d; }
    .analise-actions { display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap; }
    .empty-state    { text-align:center;padding:80px 20px;color:var(--text-lo); }
    .empty-state div { font-size:48px;margin-bottom:12px; }
    /* Modal detalhes */
    .modal-det-overlay { position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto; }
    .modal-det  { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);width:min(820px,98vw);padding:28px;position:relative; }
    .modal-det-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px; }
    .modal-det-title  { font-size:16px;font-weight:700;color:var(--text-hi); }
    /* Reutiliza estilos do analisador */
    .score-bar-wrap { background:var(--bg-hover);border-radius:8px;height:8px;flex:1;overflow:hidden; }
    .score-bar      { height:100%;border-radius:8px; }
    .score-alto     { background:var(--success); }
    .score-medio    { background:var(--warning); }
    .score-baixo    { background:var(--error); }
    .nivel-alto     { background:#dcfce7;color:#15803d; }
    .nivel-medio    { background:#fef9c3;color:#a16207; }
    .nivel-baixo    { background:#fee2e2;color:#b91c1c; }
    .nivel-badge    { padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600; }
    .result-card    { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px; }
    .result-card.finalista { border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.10); }
    .result-header  { display:flex;align-items:center;gap:12px;margin-bottom:10px; }
    .result-rank    { font-size:20px;font-weight:800;color:var(--text-lo);min-width:28px;text-align:center; }
    .result-name    { font-size:14px;font-weight:700;color:var(--text-hi); }
    .result-contact { font-size:12px;color:var(--text-lo);margin-top:2px; }
    .result-score   { margin-left:auto;text-align:right; }
    .result-score-num { font-size:22px;font-weight:800;color:var(--accent);line-height:1; }
    .result-score-lbl { font-size:11px;color:var(--text-lo); }
    .score-row      { display:flex;align-items:center;gap:10px;margin-bottom:6px; }
    .detail-scores  { display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border); }
    .detail-score   { text-align:center;min-width:72px; }
    .detail-score-val { font-size:16px;font-weight:700;color:var(--accent); }
    .detail-score-lbl { font-size:10px;color:var(--text-lo);text-transform:uppercase;letter-spacing:.05em;margin-top:2px; }
    .badge-finalista{ background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;border-radius:12px;padding:2px 9px;font-size:11px;font-weight:600; }
    .ponto-list     { font-size:12px;line-height:1.8;margin:0; }
    .ponto-list li  { list-style:none;padding-left:16px;position:relative;color:var(--text-md); }
    .ponto-list li::before { position:absolute;left:0; }
    .ponto-pos li::before  { content:"✓";color:var(--success); }
    .ponto-neg li::before  { content:"●";color:var(--error);font-size:9px;top:3px; }
    .pontos         { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px; }
    .resumo         { font-size:12.5px;color:var(--text-md);line-height:1.7;margin-top:8px;padding-top:8px;border-top:1px solid var(--border); }
    /* Eliminados no modal */
    .eliminados-table { width:100%;border-collapse:collapse;font-size:12.5px; }
    .eliminados-table th { font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-lo);font-weight:600;padding:6px 10px 6px 0;text-align:left;border-bottom:1px solid var(--border); }
    .eliminados-table td { padding:8px 10px 8px 0;vertical-align:top;border-bottom:1px solid var(--border); }
    .eliminados-table tr:last-child td { border-bottom:none; }
    .eliminados-table .col-nome    { font-weight:600;color:var(--text-hi);width:25%;word-break:break-word; }
    .eliminados-table .col-contato { color:var(--text-lo);width:22%;font-size:11.5px; }
    .eliminados-table .col-motivo  { color:var(--text-lo);font-size:11.5px;line-height:1.5; }
    /* Eliminados toggle */
    .elim-toggle { background:none;border:1px solid var(--border);border-radius:8px;padding:8px 14px;width:100%;text-align:left;cursor:pointer;color:var(--text-md);font-size:12.5px;display:flex;justify-content:space-between;align-items:center; }
    .elim-toggle:hover { background:var(--bg-hover); }
  </style>
</head>
<body>
<div class="layout">

    <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo" onclick="toggleSidebar()">
      <div class="logo-icon">IA</div>
      <span class="logo-text">IAHub</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-title">Integrações</div>
      <div class="nav-parent" onclick="toggleSubmenu('whatsapp')">
        <span class="nav-icon">💬</span><span class="nav-label">WhatsApp Currículo</span><span class="nav-arrow">▾</span>
      </div>
      <div class="submenu" id="sub-whatsapp">
        <a href="/dashboard.html" class="nav-item sub"><span class="nav-icon">⊞</span><span class="nav-label">Dashboard</span></a>
        <a href="/monitor.html" class="nav-item sub"><span class="nav-icon">⬛</span><span class="nav-label">Monitor</span></a>
        <a href="/curriculos.html" class="nav-item sub"><span class="nav-icon">☰</span><span class="nav-label">Currículos</span></a>
      </div>
      <div class="nav-section-title" style="margin-top:12px">Recrutamento</div>
      <div class="nav-parent" onclick="toggleSubmenu('vagas')">
        <span class="nav-icon">💼</span><span class="nav-label">Analisador de Currículos</span><span class="nav-arrow">▾</span>
      </div>
      <div class="submenu" id="sub-vagas">
        <a href="/funcoes.html" class="nav-item sub"><span class="nav-icon">📋</span><span class="nav-label">Cadastro de Funções</span></a>
        <a href="/vagas.html" class="nav-item sub"><span class="nav-icon">💼</span><span class="nav-label">Vagas por Função</span></a>
        <a href="/analisador.html" class="nav-item sub"><span class="nav-icon">🔍</span><span class="nav-label">Analisador de Currículos</span></a>
        <a href="/historico.html" class="nav-item sub active"><span class="nav-icon">📊</span><span class="nav-label">Histórico de Análises</span></a>
      </div>
      <div class="nav-section-title" style="margin-top:12px">Sistema</div>
      <a href="/configuracoes.html" class="nav-item"><span class="nav-icon">⚙</span><span class="nav-label">Configurações</span></a>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar">A</div>
      <div class="user-info-text">
        <div class="user-name">Admin</div><div class="user-role">Administrador</div>
      </div>
      <button class="btn-logout" title="Sair" onclick="logout()">⏻</button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Histórico de Análises</span>
      <span class="topbar-breadcrumb ms-auto">Recrutamento › Histórico</span>
    </div>

    <div class="page-content">

      <!-- Filtros -->
      <div class="d-flex gap-3 mb-4" style="align-items:center;flex-wrap:wrap">
        <select id="filtro-vaga" class="form-control" style="max-width:320px" onchange="filtrar()">
          <option value="">Todas as vagas</option>
        </select>
        <span id="total-label" style="font-size:13px;color:var(--text-lo)"></span>
      </div>

      <div id="lista-analises"></div>

    </div>
  </div>
</div>

<!-- Modal detalhes da análise -->
<div id="modal-det" class="modal-det-overlay d-none" onclick="if(event.target===this)fecharModal()">
  <div class="modal-det">
    <div class="modal-det-header">
      <div class="modal-det-title" id="modal-det-titulo"></div>
      <button onclick="fecharModal()" style="background:none;border:none;color:var(--text-lo);font-size:22px;cursor:pointer;line-height:1;padding:0">✕</button>
    </div>
    <div id="modal-det-body"></div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  let todasAnalises = [], vagas = [];

  async function carregar() {
    [todasAnalises, vagas] = await Promise.all([
      fetch('/api/analises').then(r => r.json()),
      fetch('/api/vagas').then(r => r.json()),
    ]);

    // Popula filtro de vagas
    const vagasComAnalise = [...new Set(todasAnalises.map(a => a.vaga_id))];
    const sel = document.getElementById('filtro-vaga');
    vagas
      .filter(v => vagasComAnalise.includes(v.id))
      .forEach(v => {
        const f = v.funcao || {};
        const opt = document.createElement('option');
        opt.value = v.id;
        opt.textContent = `${f.nome || '—'}${f.nivel_experiencia && f.nivel_experiencia !== 'Não especificado' ? ` (${f.nivel_experiencia})` : ''}`;
        sel.appendChild(opt);
      });

    // Auto-filtra se vaga_id na URL
    const params = new URLSearchParams(location.search);
    const vagaId = params.get('vaga_id');
    if (vagaId) sel.value = vagaId;

    filtrar();
  }

  function filtrar() {
    const vagaId = Number(document.getElementById('filtro-vaga').value) || null;
    const lista  = vagaId ? todasAnalises.filter(a => a.vaga_id === vagaId) : todasAnalises;
    renderLista(lista);
  }

  function renderLista(lista) {
    const el = document.getElementById('lista-analises');
    document.getElementById('total-label').textContent = `${lista.length} análise${lista.length !== 1 ? 's' : ''} encontrada${lista.length !== 1 ? 's' : ''}`;

    if (!lista.length) {
      el.innerHTML = `<div class="empty-state"><div>📊</div><strong>Nenhuma análise salva</strong><p style="font-size:13px;margin-top:6px">Após analisar currículos, clique em <strong>Encerrar e Salvar Análise</strong> para registrar aqui.</p></div>`;
      return;
    }

    el.innerHTML = lista.map(a => {
      const dataFmt = new Date(a.data).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
      const horaFmt = new Date(a.data).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
      const vaga = vagas.find(v => v.id === a.vaga_id);
      const vagaLabel = vaga ? ` · Vaga #${vaga.id} — ${vaga.quantidade} vaga${vaga.quantidade !== 1 ? 's' : ''}` : '';
      return `
        <div class="analise-card">
          <div class="analise-header">
            <div style="flex:1">
              <div class="analise-data">${dataFmt} às ${horaFmt}</div>
              <div class="analise-funcao">${a.funcao_nome || '—'}</div>
              <div class="analise-meta">${vagaLabel}</div>
            </div>
            <span class="badge" style="background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;align-self:flex-start">Encerrada</span>
          </div>
          <div class="analise-stats">
            <div class="stat-pill">
              <div class="stat-pill-val">${a.total_curriculos}</div>
              <div class="stat-pill-lbl">Recebidos</div>
            </div>
            <div class="stat-pill">
              <div class="stat-pill-val">${a.total_analisados}</div>
              <div class="stat-pill-lbl">Analisados</div>
            </div>
            <div class="stat-pill">
              <div class="stat-pill-val" style="color:#b91c1c">${a.total_eliminados}</div>
              <div class="stat-pill-lbl">Eliminados</div>
            </div>
            <div class="stat-pill stat-pill-fin">
              <div class="stat-pill-val">${a.finalistas_count}</div>
              <div class="stat-pill-lbl">Finalistas</div>
            </div>
          </div>
          <div class="analise-actions">
            <button class="btn btn-primary" style="font-size:12px" onclick="verDetalhes('${a.id}')">🔎 Ver Detalhes</button>
            <a href="/analisador.html?vaga_id=${a.vaga_id}" class="btn btn-ghost" style="font-size:12px">▶ Gerar novamente</a>
            <button class="btn btn-danger" style="font-size:12px;margin-left:auto" onclick="excluir('${a.id}')">🗑 Excluir</button>
          </div>
        </div>`;
    }).join('');
  }

  async function verDetalhes(id) {
    const a = await fetch(`/api/analises/${id}`).then(r => r.json());
    const dataFmt = new Date(a.data).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    document.getElementById('modal-det-titulo').textContent = `📊 ${a.funcao_nome} — ${dataFmt}`;

    const resultados  = a.resultados  || [];
    const eliminados  = a.eliminados  || [];
    const finalistasIds = new Set(a.finalistas_ids || []);

    const cards = resultados.map((r, i) => {
      const ehFinalista = finalistasIds.has(r.id);
      const nivelCls = r.nivel === 'Alto' ? 'nivel-alto' : r.nivel === 'Médio' ? 'nivel-medio' : 'nivel-baixo';
      const barCls   = r.nivel === 'Alto' ? 'score-alto' : r.nivel === 'Médio' ? 'score-medio' : 'score-baixo';
      const pos = (r.pontos_positivos || []).map(p => `<li>${p}</li>`).join('');
      const neg = (r.pontos_negativos || []).map(p => `<li>${p}</li>`).join('');
      const det = r.detalhes || {};
      const detHtml = (det.requisitos_obrigatorios !== undefined) ? `
        <div class="detail-scores">
          <div class="detail-score"><div class="detail-score-val">${det.requisitos_obrigatorios ?? '—'}<span style="font-size:10px;color:var(--text-lo)">/40</span></div><div class="detail-score-lbl">Req. Obrigatórios</div></div>
          <div class="detail-score"><div class="detail-score-val">${det.habilidades_tecnicas ?? '—'}<span style="font-size:10px;color:var(--text-lo)">/30</span></div><div class="detail-score-lbl">Habilidades</div></div>
          <div class="detail-score"><div class="detail-score-val">${det.nivel_experiencia ?? '—'}<span style="font-size:10px;color:var(--text-lo)">/15</span></div><div class="detail-score-lbl">Experiência</div></div>
          <div class="detail-score"><div class="detail-score-val">${det.formacao ?? '—'}<span style="font-size:10px;color:var(--text-lo)">/15</span></div><div class="detail-score-lbl">Formação</div></div>
        </div>` : '';
      return `
        <div class="result-card ${ehFinalista ? 'finalista' : ''}">
          <div class="result-header">
            <div class="result-rank">${i + 1}º</div>
            <div>
              <div class="result-name">${r.nome || '—'}${ehFinalista ? ' <span class="badge-finalista">★ Finalista</span>' : ''}</div>
              <div class="result-contact">${r.telefone || ''}${r.telefone && r.email ? ' · ' : ''}${r.email || ''}</div>
              ${r.nivel_candidato ? `<div style="margin-top:4px;font-size:11px;color:var(--text-lo)">Candidato: ${r.nivel_candidato}${r.exp_total ? ` · Total: ${r.exp_total}` : ''}</div>` : ''}
            </div>
            <div class="result-score">
              <div class="result-score-num">${r.score}</div>
              <div class="result-score-lbl">/ 100</div>
              <span class="nivel-badge ${nivelCls}" style="margin-top:4px;display:inline-block">${r.nivel}</span>
            </div>
          </div>
          <div class="score-row">
            <span style="font-size:11px;color:var(--text-lo);min-width:80px">Compatibilidade</span>
            <div class="score-bar-wrap"><div class="score-bar ${barCls}" style="width:${r.score}%"></div></div>
            <span style="font-size:11.5px;color:var(--text-lo);min-width:30px">${r.score}%</span>
          </div>
          ${detHtml}
          ${pos || neg ? `<div class="pontos">
            ${pos ? `<div><div style="font-size:10px;color:var(--success);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Pontos positivos</div><ul class="ponto-list ponto-pos">${pos}</ul></div>` : ''}
            ${neg ? `<div><div style="font-size:10px;color:var(--error);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Pontos a avaliar</div><ul class="ponto-list ponto-neg">${neg}</ul></div>` : ''}
          </div>` : ''}
          ${r.resumo ? `<div class="resumo">${r.resumo}</div>` : ''}
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);text-align:right">
            <a href="/curriculo.html?id=${r.id}" target="_blank" class="btn btn-ghost" style="font-size:11.5px;padding:4px 12px">📄 Ver Currículo</a>
          </div>
        </div>`;
    }).join('');

    const elimSection = eliminados.length ? `
      <div style="margin-top:20px">
        <button class="elim-toggle" onclick="toggleElim(this)">
          <span>🚫 ${eliminados.length} eliminado${eliminados.length !== 1 ? 's' : ''} na triagem</span>
          <span>▾</span>
        </button>
        <div class="elim-body" style="display:none;background:var(--bg-card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:10px 14px">
          <table class="eliminados-table">
            <thead><tr><th>Candidato</th><th>Contato</th><th>Motivo</th></tr></thead>
            <tbody>${eliminados.map(e => `
              <tr>
                <td class="col-nome">${e.nome}</td>
                <td class="col-contato">${e.telefone || '—'}${e.email ? `<br>${e.email}` : ''}</td>
                <td class="col-motivo">${e.motivo || '—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : '';

    const finCount = finalistasIds.size;
    document.getElementById('modal-det-body').innerHTML = `
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div style="font-size:13px;color:var(--text-md)">${resultados.length} analisados · <strong style="color:#15803d">${finCount} finalista${finCount !== 1 ? 's' : ''}</strong> · ${eliminados.length} eliminados</div>
        <a href="/analisador.html?vaga_id=${a.vaga_id}" class="btn btn-primary ms-auto" style="font-size:12px">▶ Gerar novamente</a>
      </div>
      ${resultados.length ? cards : '<p style="color:var(--text-lo);font-size:13px">Nenhum candidato analisado.</p>'}
      ${elimSection}`;

    document.getElementById('modal-det').classList.remove('d-none');
  }

  function fecharModal() {
    document.getElementById('modal-det').classList.add('d-none');
  }

  function toggleElim(btn) {
    const body = btn.nextElementSibling;
    const aberto = body.style.display !== 'none';
    body.style.display = aberto ? 'none' : 'block';
    btn.querySelector('span:last-child').textContent = aberto ? '▾' : '▴';
  }

  async function excluir(id) {
    if (!confirm('Excluir esta análise? Esta ação não pode ser desfeita.')) return;
    await fetch(`/api/analises/${id}`, { method: 'DELETE' });
    todasAnalises = todasAnalises.filter(a => a.id !== id);
    filtrar();
  }

  carregar();
</script>
</body>
</html>
