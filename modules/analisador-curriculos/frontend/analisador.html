<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analisador de Currículos — IAHub</title>
  <link rel="stylesheet" href="/css/iahub.css">
  <style>
    .score-bar-wrap { background:var(--bg-hover);border-radius:8px;height:8px;flex:1;overflow:hidden; }
    .score-bar      { height:100%;border-radius:8px;transition:width .6s ease; }
    .score-alto     { background:var(--success); }
    .score-medio    { background:var(--warning); }
    .score-baixo    { background:var(--error); }
    .nivel-alto     { background:#14532d;color:var(--success); }
    .nivel-medio    { background:#2d1e00;color:var(--warning); }
    .nivel-baixo    { background:#450a0a;color:var(--error); }
    .nivel-badge    { padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600; }
    .result-card    { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;transition:border-color .2s; }
    .result-card:hover { border-color:var(--accent); }
    .result-header  { display:flex;align-items:center;gap:14px;margin-bottom:12px; }
    .result-rank    { font-size:22px;font-weight:800;color:var(--text-lo);min-width:32px;text-align:center; }
    .result-name    { font-size:15px;font-weight:700;color:var(--text-hi); }
    .result-contact { font-size:12px;color:var(--text-lo);margin-top:2px; }
    .result-score   { margin-left:auto;text-align:right; }
    .result-score-num { font-size:26px;font-weight:800;color:var(--accent-light);line-height:1; }
    .result-score-lbl { font-size:11px;color:var(--text-lo); }
    .score-row      { display:flex;align-items:center;gap:10px;margin-bottom:8px; }
    .pontos         { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px; }
    .ponto-list     { font-size:12.5px;line-height:1.9; }
    .ponto-list li  { list-style:none;padding-left:18px;position:relative;color:var(--text-md); }
    .ponto-list li::before { position:absolute;left:0; }
    .ponto-pos li::before  { content:"✓";color:var(--success); }
    .ponto-neg li::before  { content:"✗";color:var(--error); }
    .resumo         { font-size:13px;color:var(--text-md);line-height:1.7;margin-top:10px;padding-top:10px;border-top:1px solid var(--border); }
    .loader         { display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px; }
    .spinner        { width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state    { text-align:center;padding:80px 20px;color:var(--text-lo); }
    .empty-state div { font-size:48px;margin-bottom:12px; }
    .filtros        { display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px; }
    .select-funcao  { min-width:280px; }
    .tag            { background:var(--bg-hover);border:1px solid var(--border);border-radius:16px;padding:3px 12px;font-size:12px;color:var(--text-md); }
  </style>
</head>
<body>
<div class="layout">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo" onclick="toggleSidebar()">
      <div class="logo-icon">IA</div>
      <span class="logo-text">IAHub</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-title">Integrações</div>
      <div class="nav-parent" onclick="toggleSubmenu('whatsapp')">
        <span class="nav-icon">💬</span><span class="nav-label">WhatsApp Currículo</span><span class="nav-arrow">▾</span>
      </div>
      <div class="submenu" id="sub-whatsapp">
        <a href="/dashboard.html"  class="nav-item sub"><span class="nav-icon">⊞</span><span class="nav-label">Dashboard</span></a>
        <a href="/monitor.html"    class="nav-item sub"><span class="nav-icon">⬛</span><span class="nav-label">Monitor</span></a>
        <a href="/curriculos.html" class="nav-item sub"><span class="nav-icon">☰</span><span class="nav-label">Currículos</span></a>
        <a href="/config.html"     class="nav-item sub"><span class="nav-icon">⚙</span><span class="nav-label">Configuração</span></a>
      </div>
      <div class="nav-section-title" style="margin-top:12px">Recrutamento</div>
      <div class="nav-parent" onclick="toggleSubmenu('vagas')">
        <span class="nav-icon">💼</span><span class="nav-label">Analisador de Currículos</span><span class="nav-arrow">▾</span>
      </div>
      <div class="submenu" id="sub-vagas">
        <a href="/funcoes.html"    class="nav-item sub"><span class="nav-icon">📋</span><span class="nav-label">Cadastro de Funções</span></a>
        <a href="/vagas.html"      class="nav-item sub"><span class="nav-icon">💼</span><span class="nav-label">Vagas por Função</span></a>
        <a href="/analisador.html" class="nav-item sub active"><span class="nav-icon">🔍</span><span class="nav-label">Analisador de Currículos</span></a>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar">A</div>
      <div class="user-info-text">
        <div class="user-name">Admin</div><div class="user-role">Administrador</div>
      </div>
      <button class="btn-logout" title="Sair" onclick="logout()">⏻</button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Analisador de Currículos</span>
      <span class="topbar-breadcrumb ms-auto">Recrutamento › Analisador</span>
    </div>

    <div class="page-content">
      <div class="card mb-4">
        <div class="card-header">🔍 Selecione a Função para Análise</div>
        <div class="card-body">
          <div class="filtros">
            <select id="sel-funcao" class="form-control select-funcao">
              <option value="">— Selecione uma função —</option>
            </select>
            <button class="btn btn-primary" onclick="analisar()" id="btn-analisar" disabled>▶ Analisar Currículos</button>
            <select id="filtro-nivel" class="form-control" style="max-width:160px" onchange="filtrarResultados()">
              <option value="">Todos os níveis</option>
              <option value="Alto">Alto</option>
              <option value="Médio">Médio</option>
              <option value="Baixo">Baixo</option>
            </select>
          </div>
          <div id="funcao-info" style="display:none;margin-top:12px;padding:14px;background:var(--bg-hover);border-radius:8px;font-size:13px;color:var(--text-md);line-height:1.8"></div>
        </div>
      </div>

      <div id="resultado-area"></div>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  let todosResultados = [];

  async function carregarFuncoes() {
    const funcoes = await fetch('/api/funcoes').then(r => r.json());
    const sel = document.getElementById('sel-funcao');
    sel.innerHTML = '<option value="">— Selecione uma função —</option>' +
      funcoes.map(f => `<option value="${f.id}">${f.nome}${f.area ? ` — ${f.area}` : ''}${f.nivel_experiencia && f.nivel_experiencia !== 'Não especificado' ? ` (${f.nivel_experiencia})` : ''}</option>`).join('');

    sel.addEventListener('change', async () => {
      const id = Number(sel.value);
      document.getElementById('btn-analisar').disabled = !id;
      const info = document.getElementById('funcao-info');
      if (!id) { info.style.display = 'none'; return; }
      const f = await fetch(`/api/funcoes/${id}`).then(r => r.json());
      info.style.display = 'block';
      const tags = arr => Array.isArray(arr) && arr.length
        ? arr.map(t => `<span class="tag">${t}</span>`).join(' ')
        : '—';
      info.innerHTML = `
        <strong style="color:var(--text-hi)">${f.nome}</strong>
        ${f.area ? ` · <span>${f.area}</span>` : ''}
        ${f.nivel_experiencia ? ` · <span>${f.nivel_experiencia}</span>` : ''}
        ${f.descricao ? `<br><span style="color:var(--text-lo)">${f.descricao.slice(0,180)}${f.descricao.length>180?'…':''}</span>` : ''}
        <br>
        ${f.habilidades_tecnicas?.length ? `<span style="color:var(--text-lo)">Habilidades:</span> ${tags(f.habilidades_tecnicas)}` : ''}`;
    });

    // Auto-seleciona se vier via query string
    const params = new URLSearchParams(location.search);
    const funcaoId = params.get('funcao_id');
    if (funcaoId) {
      sel.value = funcaoId;
      sel.dispatchEvent(new Event('change'));
    }
  }

  async function analisar() {
    const funcao_id = Number(document.getElementById('sel-funcao').value);
    if (!funcao_id) return;

    document.getElementById('resultado-area').innerHTML = `
      <div class="loader">
        <div class="spinner"></div>
        <div style="color:var(--text-md);font-size:14px">Analisando currículos com IA… isso pode levar alguns instantes.</div>
      </div>`;

    try {
      const res = await fetch('/api/analisador/analisar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ funcao_id }),
      }).then(r => r.json());

      if (res.error) { document.getElementById('resultado-area').innerHTML = `<div class="empty-state"><div>⚠️</div>${res.error}</div>`; return; }

      todosResultados = res.resultados || [];
      renderResultados(todosResultados, res.total, res.funcao);
    } catch (e) {
      document.getElementById('resultado-area').innerHTML = `<div class="empty-state"><div>❌</div>Erro: ${e.message}</div>`;
    }
  }

  function filtrarResultados() {
    const nivel = document.getElementById('filtro-nivel').value;
    const filtrados = nivel ? todosResultados.filter(r => r.nivel === nivel) : todosResultados;
    renderResultados(filtrados, todosResultados.length);
  }

  function renderResultados(resultados, total, funcaoNome) {
    if (!resultados.length && !total) {
      document.getElementById('resultado-area').innerHTML = `<div class="empty-state"><div>📭</div><strong>Nenhum currículo encontrado</strong><p style="font-size:13px;margin-top:6px">Receba currículos pelo WhatsApp para analisar.</p></div>`;
      return;
    }
    const altos  = resultados.filter(r => r.nivel === 'Alto').length;
    const medios = resultados.filter(r => r.nivel === 'Médio').length;
    const baixos = resultados.filter(r => r.nivel === 'Baixo').length;

    const cards = resultados.map((r, i) => {
      const nivelCls = r.nivel === 'Alto' ? 'nivel-alto' : r.nivel === 'Médio' ? 'nivel-medio' : 'nivel-baixo';
      const barCls   = r.nivel === 'Alto' ? 'score-alto' : r.nivel === 'Médio' ? 'score-medio' : 'score-baixo';
      const pos = (r.pontos_positivos || []).map(p => `<li>${p}</li>`).join('');
      const neg = (r.pontos_negativos || []).map(p => `<li>${p}</li>`).join('');
      return `
        <div class="result-card">
          <div class="result-header">
            <div class="result-rank">${i + 1}º</div>
            <div>
              <div class="result-name">${r.nome || '—'}</div>
              <div class="result-contact">${r.telefone || ''}${r.telefone && r.email ? ' · ' : ''}${r.email || ''}</div>
            </div>
            <div class="result-score">
              <div class="result-score-num">${r.score}</div>
              <div class="result-score-lbl">/ 100</div>
              <span class="nivel-badge ${nivelCls}" style="margin-top:4px;display:inline-block">${r.nivel}</span>
            </div>
          </div>
          <div class="score-row">
            <span style="font-size:11.5px;color:var(--text-lo);min-width:80px">Compatibilidade</span>
            <div class="score-bar-wrap"><div class="score-bar ${barCls}" style="width:${r.score}%"></div></div>
            <span style="font-size:12px;color:var(--text-lo);min-width:30px">${r.score}%</span>
          </div>
          ${pos || neg ? `
          <div class="pontos">
            ${pos ? `<div><div style="font-size:11px;color:var(--success);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Pontos positivos</div><ul class="ponto-list ponto-pos">${pos}</ul></div>` : ''}
            ${neg ? `<div><div style="font-size:11px;color:var(--error);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Pontos a avaliar</div><ul class="ponto-list ponto-neg">${neg}</ul></div>` : ''}
          </div>` : ''}
          ${r.resumo ? `<div class="resumo">${r.resumo}</div>` : ''}
        </div>`;
    }).join('');

    document.getElementById('resultado-area').innerHTML = `
      <div class="d-flex gap-3 mb-3" style="align-items:center;flex-wrap:wrap">
        <span style="font-size:14px;color:var(--text-md)">
          ${funcaoNome ? `<strong style="color:var(--text-hi)">${funcaoNome}</strong> · ` : ''}
          ${resultados.length} candidato${resultados.length !== 1 ? 's' : ''} analisado${resultados.length !== 1 ? 's' : ''}
        </span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="badge badge-green">✓ ${altos} alto${altos !== 1 ? 's' : ''}</span>
          <span class="badge badge-yellow">~ ${medios} médio${medios !== 1 ? 's' : ''}</span>
          <span class="badge badge-red">✗ ${baixos} baixo${baixos !== 1 ? 's' : ''}</span>
        </div>
      </div>
      ${cards}`;
  }

  carregarFuncoes();
</script>
</body>
</html>
